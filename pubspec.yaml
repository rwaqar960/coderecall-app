name: coderecall
description: "Offline-first, login-free skill refreshers and quizzes for senior developers."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.1

dependencies:
  drift: '>=2.26.0 <3.0.0'
  drift_flutter: '>=0.2.4 <0.4.0'
  flutter:
    sdk: flutter
  flutter_markdown_plus: ^1.0.12
  path: ^1.9.1
  path_provider: ^2.1.6
  # sqlite3 pinned to 2.x: the 3.x line uses Dart native build hooks, which
  # build_runner cannot compile against yet (breaks drift codegen).
  sqlite3: ^2.9.0
  sqlite3_flutter_libs: ^0.5.28
  yaml: ^3.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: '>=2.26.0 <3.0.0'
  build_runner: '>=2.4.0 <3.0.0'

flutter:
  uses-material-design: true
  assets:
    - assets/content/
    - assets/content/oop/
    - assets/content/oop/chapters/
    - assets/content/oop/quizzes/
