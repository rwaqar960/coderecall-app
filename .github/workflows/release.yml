name: Release (signed APK)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.3'
          channel: stable

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.jks

      - name: Write key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=release.jks
          EOF

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build apk --release

      - name: Verify APK is release-signed, not the debug fallback key
        # Modern AGP signs with the v2/v3 scheme by default, which `keytool
        # -printcert -jarfile` can't read (it only understands legacy v1/JAR
        # signing and reports "Not a signed jar file" even on a valid APK) —
        # apksigner is the tool that actually understands v2/v3.
        run: |
          apk=build/app/outputs/flutter-apk/app-release.apk
          apksigner=$(find "$ANDROID_HOME/build-tools" -name apksigner | sort -V | tail -1)
          if ! "$apksigner" verify --print-certs "$apk" | grep -q "CN=CodeRecall"; then
            echo "::error::APK is not signed with the CodeRecall release key — check the ANDROID_* secrets are set correctly."
            exit 1
          fi

      - name: Stage APK for release
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk "dist/coderecall-${GITHUB_REF_NAME}.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
          generate_release_notes: true
